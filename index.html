<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=yes">
    <link rel="shortcut icon" href="https://thanhnien-static.mediacdn.vn/thanhnien.vn/image/tn-favicon.png" type="image/png">
    <title>KPI Dashboard 2026 – Báo Thanh Niên</title>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0081b1;
            --primary-dark: #005f85;
            --primary-light: #e6f4fa;
            --success: #16a34a;
            --success-bg: #dcfce7;
            --danger: #dc2626;
            --danger-bg: #fee2e2;
            --warning: #d97706;
            --warning-bg: #fef3c7;
            --bg: #f0f4f8;
            --card: #ffffff;
            --border: #e2e8f0;
            --text: #0f172a;
            --text-2: #64748b;
            --text-3: #94a3b8;
            --radius: 10px;
            --shadow: 0 1px 3px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Public Sans', sans-serif;
            font-size: 16px;
            background: #fff;
            color: var(--text);
            min-height: 100vh;
        }

        /* HEADER */
        .header {
            background: #fff;
            border-bottom: 1px solid var(--border);
            padding: 0 16px;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            height: 56px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow);
        }

        .header-logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

            .header-logo svg {
                height: 22px;
                width: auto;
            }

        .header-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-2);
            border-left: 1px solid var(--border);
            padding-left: 12px;
            margin-left: 4px;
        }

        .header-right {
            display: none;
            align-items: center;
            gap: 8px;
        }

        .btn {
            padding: 12px 16px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid var(--border);
            background: #fff;
            color: var(--text);
            font-family: inherit;
            transition: all 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

            .btn:hover {
                background: var(--bg);
                border-color: var(--primary);
                color: var(--primary);
            }

        .btn-primary {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

            .btn-primary:hover {
                background: var(--primary-dark);
                border-color: var(--primary-dark);
                color: #fff;
            }

        .btn-sm {
            padding: 6px 10px;
            font-size: 12px;
        }

        /* LAYOUT */
        .layout {
            display: flex;
            min-height: calc(100vh - 56px);
        }

        .sidebar {
            width: 220px;
            background: #fff;
            border-right: 1px solid var(--border);
            padding: 16px 0;
            flex-shrink: 0;
            position: sticky;
            top: 56px;
            height: calc(100vh - 56px);
            overflow-y: auto;
        }

        .sidebar-section {
            padding: 4px 12px 8px;
        }

        .sidebar-label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-3);
            padding: 0 4px;
            margin-bottom: 4px;
        }

        .sidebar-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 7px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            color: var(--text-2);
            transition: all 0.12s;
            margin-bottom: 1px;
        }

            .sidebar-item:hover {
                background: var(--bg);
                color: var(--text);
            }

            .sidebar-item.active {
                background: var(--primary-light);
                color: var(--primary);
                font-weight: 600;
            }

        .sidebar-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--text-3);
            flex-shrink: 0;
        }

        .sidebar-item.active .sidebar-dot {
            background: var(--primary);
        }

        .main {
            flex: 1;
            padding: 24px;
            overflow: auto;
        }

        /* TABS */
        .tabs {
            display: flex;
            gap: 4px;
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 4px;
            margin-bottom: 20px;
            width: fit-content;
        }

        .tab {
            padding: 7px 16px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            color: var(--text-2);
            transition: all 0.12s;
            border: none;
            background: none;
            font-family: inherit;
        }

            .tab.active {
                background: var(--primary);
                color: #fff;
            }

            .tab:hover:not(.active) {
                background: var(--bg);
                color: var(--text);
            }

        /* STATS ROW */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px 20px;
            box-shadow: var(--shadow);
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-2);
            font-weight: 500;
            margin-bottom: 6px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 4px;
        }

        .stat-sub {
            font-size: 12px;
            color: var(--text-3);
        }

        .stat-card.primary .stat-value {
            color: var(--primary);
        }

        .stat-card.success .stat-value {
            color: var(--success);
        }

        .stat-card.danger .stat-value {
            color: var(--danger);
        }

        /* MONTH FILTER */
        .filters {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .filters-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-2);
        }

        .month-chips {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .chip {
            padding: 6px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid var(--border);
            background: #fff;
            color: var(--text-2);
            transition: all 0.12s;
        }

            .chip:hover {
                border-color: var(--primary);
                color: var(--primary);
            }

            .chip.active {
                background: var(--primary);
                color: #fff;
                border-color: var(--primary);
            }

        .chip-empty {
            opacity: 0.5;
            background: var(--bg);
        }

            .chip-empty.active {
                background: var(--text-3);
                border-color: var(--text-3);
                opacity: 1;
            }

        /* TABLE */
        .table-wrap {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

            .table-wrap table {
                min-width: 600px;
            }

            .table-wrap > div {
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }

        .table-header {
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .table-title {
            font-size: 14px;
            font-weight: 700;
        }

        .table-count {
            font-size: 12px;
            color: var(--text-3);
        }

        .search-input {
            padding: 8px 14px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 13px;
            font-family: inherit;
            outline: none;
            width: 200px;
            transition: border-color 0.15s;
        }

            .search-input:focus {
                border-color: var(--primary);
            }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        thead th {
            background: #f8fafc;
            padding: 10px 14px;
            text-align: left;
            font-weight: 600;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-2);
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }

            thead th.right {
                text-align: right;
            }

        tbody tr {
            border-bottom: 1px solid var(--border);
            transition: background 0.1s;
            cursor: pointer;
        }

            tbody tr:last-child {
                border-bottom: none;
            }

            tbody tr:hover {
                background: var(--primary-light);
            }

        tbody td {
            padding: 10px 14px;
            vertical-align: middle;
        }

            tbody td.right {
                text-align: right;
            }

            tbody td.name {
                font-weight: 600;
            }

        .dept-tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            background: var(--primary-light);
            color: var(--primary);
            font-size: 11px;
            font-weight: 600;
        }

        /* PROGRESS BAR */
        .progress-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .progress-bar {
            flex: 1;
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            overflow: hidden;
            min-width: 60px;
        }

        .progress-fill {
            height: 100%;
            border-radius: 3px;
            transition: width 0.3s;
        }

            .progress-fill.good {
                background: var(--success);
            }

            .progress-fill.warn {
                background: var(--warning);
            }

            .progress-fill.bad {
                background: var(--danger);
            }

        .progress-pct {
            font-size: 12px;
            font-weight: 700;
            min-width: 36px;
            text-align: right;
        }

            .progress-pct.good {
                color: var(--success);
            }

            .progress-pct.warn {
                color: var(--warning);
            }

            .progress-pct.bad {
                color: var(--danger);
            }

        /* DƯ/THIẾU BADGE */
        .du-badge {
            display: inline-flex;
            align-items: center;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 700;
            white-space: nowrap;
        }

            .du-badge.pos {
                background: var(--success-bg);
                color: var(--success);
            }

            .du-badge.neg {
                background: var(--danger-bg);
                color: var(--danger);
            }

            .du-badge.zero {
                background: var(--bg);
                color: var(--text-3);
            }

        /* MODAL */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal {
            background: var(--card);
            border-radius: 12px;
            width: 100%;
            max-width: 860px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }

        .modal-head {
            padding: 20px 24px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
        }

        .modal-title {
            font-size: 17px;
            font-weight: 800;
        }

        .modal-sub {
            font-size: 13px;
            color: var(--text-2);
            margin-top: 3px;
        }

        .close-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 20px;
            color: var(--text-3);
            padding: 0 4px;
        }

            .close-btn:hover {
                color: var(--text);
            }

        .modal-body {
            padding: 20px 24px;
        }

        /* MONTHLY TABLE in modal */
        .month-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            margin-top: 12px;
        }

            .month-table th {
                padding: 8px 12px;
                background: #f8fafc;
                font-size: 11px;
                font-weight: 700;
                text-transform: uppercase;
                color: var(--text-2);
                border: 1px solid var(--border);
                text-align: right;
            }

                .month-table th:first-child {
                    text-align: left;
                }

            .month-table td {
                padding: 8px 12px;
                border: 1px solid var(--border);
                text-align: right;
            }

                .month-table td:first-child {
                    text-align: left;
                    font-weight: 600;
                }

            .month-table tr:nth-child(even) td {
                background: #f8fafc;
            }

        /* UPLOAD PANEL */
        .upload-panel {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--shadow);
        }

        .upload-zone {
            border: 2px dashed var(--border);
            border-radius: 8px;
            padding: 32px;
            text-align: center;
            cursor: pointer;
            transition: all 0.15s;
            margin-bottom: 16px;
        }

            .upload-zone:hover {
                border-color: var(--primary);
                background: var(--primary-light);
            }

            .upload-zone.drag {
                border-color: var(--primary);
                background: var(--primary-light);
            }

        .upload-icon {
            font-size: 36px;
            margin-bottom: 10px;
        }

        .upload-text {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-2);
            margin-bottom: 4px;
        }

        .upload-sub {
            font-size: 12px;
            color: var(--text-3);
        }

        .upload-result {
            background: var(--bg);
            border-radius: 6px;
            padding: 12px 16px;
            font-size: 13px;
            margin-top: 12px;
        }

            .upload-result.success {
                background: var(--success-bg);
                color: var(--success);
            }

            .upload-result.error {
                background: var(--danger-bg);
                color: var(--danger);
            }

        /* LOGIN */
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
             background: url(img/bg--blue.jpg)no-repeat;
            background-size:cover;
        }

        .login-card {
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 40px;
            width: 360px;
            box-shadow: var(--shadow-md);
        }

        .login-logo {
            display: flex;
            justify-content: center;
            margin-bottom: 24px;
        }

        .login-title {
            font-size: 20px;
            font-weight: 800;
            text-align: center;
      margin-bottom: 28px;
        }

        .login-sub {
            font-size: 13px;
            color: var(--text-2);
            text-align: center;
                  margin-bottom: 6px;
           
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .form-input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.15s;
        }

            .form-input:focus {
                border-color: var(--primary);
            }

        .alert {
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 14px;
        }

        .alert-error {
            background: var(--danger-bg);
            color: var(--danger);
        }

        /* EMPTY */
        .empty {
            text-align: center;
            padding: 48px 20px;
            color: var(--text-3);
        }

        .empty-icon {
            font-size: 36px;
            margin-bottom: 10px;
        }

        .empty-text {
            font-size: 14px;
        }

        /* TOOLTIP-LIKE number formatting */
        .num {
            font-variant-numeric: tabular-nums;
        }

        /* YEARLY PROGRESS CHART */
        .yearly-chart {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px 24px;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
        }

        .yearly-chart-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-2);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .yearly-chart-overall {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding: 14px 16px;
            background: var(--bg);
            border-radius: 8px;
        }

        .yearly-chart-overall-label {
            font-size: 13px;
            color: var(--text-2);
        }

        .yearly-chart-overall-val {
            font-size: 28px;
            font-weight: 800;
            margin-left: auto;
        }

        .yearly-chart-overall-pv {
            font-size: 12px;
            color: var(--text-3);
        }

        .dept-bars {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .dept-bar-row {
            display: grid;
            grid-template-columns: 140px 1fr 52px 140px;
            align-items: center;
            gap: 10px;
            font-size: 12px;
        }

        .dept-bar-name {
            font-weight: 600;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .dept-bar-track {
            height: 8px;
            background: var(--border);
            border-radius: 4px;
            overflow: hidden;
        }

        .dept-bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.4s ease;
        }

            .dept-bar-fill.good {
                background: var(--success);
            }

            .dept-bar-fill.warn {
                background: var(--warning);
            }

            .dept-bar-fill.bad {
                background: var(--danger);
            }

        .dept-bar-pct {
            font-weight: 700;
            text-align: right;
        }

        .dept-bar-val {
            color: var(--text-3);
            text-align: right;
            font-size: 11px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 4px;
            min-width: 120px;
        }

        @media (max-width: 640px) {
            .dept-bar-row {
                grid-template-columns: 90px 1fr 44px;
            }

            .dept-bar-val {
                display: none;
            }
        }

        @media (max-width: 900px) {
            .sidebar {
                display: block;
                position: fixed;
                top: 56px;
                left: -240px;
                height: calc(100vh - 56px);
                z-index: 90;
                transition: left 0.25s;
                box-shadow: var(--shadow-md);
            }

                .sidebar.open {
                    left: 0;
                }

            .sidebar-overlay {
                display: none;
                position: fixed;
                inset: 0;
                top: 56px;
                background: rgba(0,0,0,0.3);
                z-index: 89;
            }

                .sidebar-overlay.show {
                    display: block;
                }

            .stats-row {
                grid-template-columns: repeat(2,1fr);
            }

            .main {
                padding: 16px;
            }

            .menu-btn {
                display: flex !important;
                margin-right: 15px;
            }

            .menu-btn svg path {
                transform-origin: center;
                transform-box: fill-box;
                transition: transform 0.2s ease, opacity 0.2s ease;
            }

            .menu-btn.open svg .line1 {
                transform: translateY(7px) rotate(45deg);
            }

            .menu-btn.open svg .line2 {
                opacity: 0;
            }

            .menu-btn.open svg .line3 {
                transform: translateY(-7px) rotate(-45deg);
            }
        }

        @media (min-width: 901px) {
            .menu-btn {
                display: none !important;
            }

            .sidebar-overlay {
                display: none !important;
            }
        }
    </style>
</head>

        function fmt(n) {
            if (!n && n !== 0) return '—'
            n = parseFloat(n)

            if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K'
            return n.toLocaleString('vi-VN')
        }

            if (!n && n !== 0) return '—'

        // ─── YEARLY CHART ─────────────────────────────────────────────────────────
        function renderYearlyChart(parent) {
            const DATA_MK = DATA_MONTHS
            const sidebarOrder = ["Thời sự - Chính Trị", "Thể Thao", "Thế giới", "Giải trí", "Văn hóa", "Đời sống", "Kinh Tế - Du Lịch - Tiêu Dùng", "Giáo dục", "Giới trẻ", "Sức khỏe", "Công nghệ - Game", "Thời trang trẻ", "Hà Nội", "Đà Nẵng", "Cần Thơ", "Nha Trang"]

            const filterList = state.selectedDept ? [state.selectedDept] : sidebarOrder
            const deptRows = filterList.map(function (d) {
                const info = state.data.departments[d]
                if (!info) return null
                const kpiNam = info.kpi && info.kpi.kpi_nam ? info.kpi.kpi_nam : 0
                let cumPV = 0
                DATA_MK.forEach(function (mk) { cumPV += (info.monthly[mk] ? info.monthly[mk].pageviews || 0 : 0) })
                return { name: d, cumPV: cumPV, kpiNam: kpiNam }
            }).filter(function (r) { return r && r.kpiNam > 0 })

            if (state.chartSort) deptRows.sort(function (a, b) { return pct(b.cumPV, b.kpiNam) - pct(a.cumPV, a.kpiNam) })

            const expectedPct = Math.round(DATA_MK.length / 12 * 100)
            const mLabel = (MONTHS.find(function (m) { return m.key === DATA_MK[DATA_MK.length - 1] }) || {}).label || ''

            let rowsHtml = deptRows.map(function (r) {
                const p = pct(r.cumPV, r.kpiNam)
                const duThieu = r.cumPV - Math.round(r.kpiNam * expectedPct / 100)
                const pc = yearlyProgressClass(p, expectedPct)
                const dc = duClass(duThieu)
                const ds = duSign(duThieu)
                const fv = fmt(r.cumPV)
                return '<div class="dept-bar-row">' +
                    '<div class="dept-bar-name" title="' + r.name + '">' + r.name + '</div>' +
                    '<div class="dept-bar-track" style="position:relative">' +
                    '<div class="dept-bar-fill ' + pc + '" style="width:' + Math.min(p, 100) + '%"></div>' +
                    '<div style="position:absolute;top:-2px;bottom:-2px;left:' + expectedPct + '%;width:2px;background:var(--text-3);border-radius:1px;opacity:0.4"></div>' +
                    '</div>' +
                    '<div class="dept-bar-pct ' + pc + '">' + p + '%</div>' +
                    '<div class="dept-bar-val">' +
                    '<span style="color:var(--text-2)">' + fv + '</span>' +
                    '<span class="du-badge ' + dc + '" style="font-size:10px;padding:1px 5px;margin-left:4px">' + ds + '</span>' +
                    '</div>' +
                    '</div>'
            }).join('')

            const chart = el('div', 'yearly-chart')
            chart.innerHTML =
                '<div class="yearly-chart-title">' +
                '<span>&#127919; Tiến độ KPI năm 2026</span>' +
                '<div style="display:flex;align-items:center;gap:8px">' +
                '<span style="font-weight:400;font-size:11px;color:var(--text-3)">Lũy kế đến ' + mLabel + '</span>' +
                '<button id="sortChartBtn" style="padding:4px 10px;border-radius:4px;border:1px solid var(--border);background:' + (state.chartSort ? 'var(--primary)' : '#fff') + ';color:' + (state.chartSort ? '#fff' : 'var(--text-2)') + ';font-size:11px;font-weight:600;cursor:pointer;font-family:inherit">' +
                (state.chartSort ? '&#8595; % Cao &rarr; Thấp' : '&#8597; Mặc định') +
                '</button>' +
                '</div>' +
                '</div>' +
                '<div class="dept-bars">' + rowsHtml + '</div>'

            parent.appendChild(chart)
        }

        // Global click handler for sort button

        // ─── DEPT VIEW ────────────────────────────────────────────────────────────

        <div class="stat-card primary">

        </div>`
            parent.appendChild(statsRow)

            // Yearly progress chart

            // Table
            const wrap = el('div', 'table-wrap')
            const head = el('div', 'table-header')
            head.innerHTML = `

          <span class="table-count" style="margin-left:8px">${depts.length} đơn vị</span>

        ${state.selectedDept ? '' : '<input class="search-input" placeholder="Tìm chuyên mục..." value="' + state.searchQuery + '" oninput="state.searchQuery=this.value;renderDeptTableBody()" id="deptSearch">'}`

        </tr></thead>
        <tbody id="deptTableBody"></tbody>
      </table>`)
            wrap.appendChild(tableWrap)
            parent.appendChild(wrap)
            requestAnimationFrame(() => renderDeptTableBody())
        }

        function renderDeptTableBody() {
            const tbody = document.getElementById('deptTableBody')
            if (!tbody) return
            const q = state.searchQuery.toLowerCase()
            const depts = (state.selectedDept ? [state.selectedDept] : Object.keys(state.data.departments))

                const pv = m.pageviews || 0
                const du = m.du_thieu || 0
                const p = pct(pv, kpiThang)
                const pc = progressClass(p)

        function openDeptModal(deptName) {

          oninput="state.searchQuery=this.value;renderReporterTableBody()" id="repSearch">`
            wrap.appendChild(head)

            const tableWrap = el('div', '', `<table>
        <thead><tr>

        function renderReporterTableBody() {
            const tbody = document.getElementById('repTableBody')
            if (!tbody) return
            const q = state.searchQuery.toLowerCase()
            if (!hasData(state.selectedMonth)) {
                tbody.innerHTML = `<tr><td colspan="7"><div class="empty"><div class="empty-icon">📅</div><div class="empty-text">Chưa có dữ liệu cho ${MONTHS.find(m => m.key === state.selectedMonth)?.label}</div></div></td></tr>`
                return
            }

                .filter(([n, v]) => (!state.selectedDept || v.department === state.selectedDept)
                    && (!q || n.toLowerCase().includes(q) || v.department.toLowerCase().includes(q)))
                .sort((a, b) => {
                    const pa = a[1].monthly[state.selectedMonth]?.tong_pv || 0
                    const pb = b[1].monthly[state.selectedMonth]?.tong_pv || 0
                    return pb - pa
                })

            if (!reporters.length) {
                tbody.innerHTML = `<tr><td colspan="7"><div class="empty"><div class="empty-icon">👥</div><div class="empty-text">Không tìm thấy phóng viên</div></div></td></tr>`

        // ─── MODAL ───────────────────────────────────────────────────────────────
        function renderModal() {
            const overlay = el('div', 'modal-overlay')
            overlay.onclick = e => { if (e.target === overlay) { state.modalItem = null; render() } }
            const modal = el('div', 'modal')

            if (state.modalType === 'reporter') {
                const name = state.modalItem
                const v = state.data.reporters[name]
                if (!v) return

                // Cumulative
                const cum = getCumulative(v.monthly, state.selectedMonth)
                const mEl = monthsElapsed(state.selectedMonth)

                let monthRows = MONTHS.filter(m => {
                    const d = v.monthly[m.key] || {}
                    return d.tong_pv > 0 || d.so_bai > 0
                }).map(m => {

                    const du = d.du_thieu || 0
                    return `<tr>

              <div class="stat-card"><div class="stat-label">PV bài viết</div><div class="stat-value">${fmt(cum.pv_bai)}</div></div>
            </div>
            <table class="month-table">
              <thead><tr><th>Tháng</th><th>Số bài</th><th>PV bài</th><th>Video</th><th>Tổng PV</th><th>Dư/Thiếu</th></tr></thead>
              <tbody>${monthRows || '<tr><td colspan="6" style="text-align:center;color:var(--text-3)">Chưa có dữ liệu</td></tr>'}</tbody>
            </table>
          </div>`

            </table>
          </div>`

            app.appendChild(overlay)

          <div style="margin-bottom:20px">
            <div style="font-size:13px;font-weight:700;margin-bottom:8px">📄 File Sản lượng theo tài khoản</div>
            <div style="font-size:12px;color:var(--text-2);margin-bottom:8px">Cột cần có: <strong>Tên đầy đủ</strong> (hoặc Bút danh) và <strong>Số bài</strong></div>
            <div class="upload-zone" id="dropBai" ondragover="event.preventDefault();this.classList.add('drag')" ondragleave="this.classList.remove('drag')" ondrop="handleDrop(event,'bai')" onclick="document.getElementById('fileBai').click()">
              <div class="upload-icon">📋</div>
              <div class="upload-text" id="labelBai">Kéo thả hoặc click để chọn file</div>
              <div class="upload-sub">SanLuongTheoTaiKhoan_ThángX.xlsx</div>
            </div>
            <input type="file" id="fileBai" accept=".xlsx,.xls" style="display:none" onchange="handleFile(this,'bai')">
          </div>

          <div style="margin-bottom:20px">
            <div style="font-size:13px;font-weight:700;margin-bottom:8px">🎬 File Video (Author)</div>
            <div style="font-size:12px;color:var(--text-2);margin-bottom:8px">Cột cần có: <strong>Author</strong> và <strong>Plays</strong></div>
            <div class="upload-zone" id="dropVideo" ondragover="event.preventDefault();this.classList.add('drag')" ondragleave="this.classList.remove('drag')" ondrop="handleDrop(event,'video')" onclick="document.getElementById('fileVideo').click()">
              <div class="upload-icon">🎥</div>
              <div class="upload-text" id="labelVideo">Kéo thả hoặc click để chọn file</div>
              <div class="upload-sub">author_Video_TX_202X.xlsx</div>
            </div>
            <input type="file" id="fileVideo" accept=".xlsx,.xls" style="display:none" onchange="handleFile(this,'video')">
          </div>

          ${state.uploadMsg ? `<div class="upload-result ${state.uploadStatus}">${state.uploadMsg}</div>` : ''}

          <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="processUpload()">
            ⬆ Cập nhật dữ liệu
          </button>
        </div>`

            overlay.appendChild(modal)
            app.appendChild(overlay)
        }

        let uploadedFiles = { bai: null, video: null }

        function handleDrop(e, type) {
            e.preventDefault()
            document.getElementById('drop' + type.charAt(0).toUpperCase() + type.slice(1)).classList.remove('drag')
            const file = e.dataTransfer.files[0]
            if (file) { uploadedFiles[type] = file; document.getElementById('label' + type.charAt(0).toUpperCase() + type.slice(1)).textContent = '✅ ' + file.name }
        }
        function handleFile(input, type) {
            const file = input.files[0]
            if (file) { uploadedFiles[type] = file; document.getElementById('label' + type.charAt(0).toUpperCase() + type.slice(1)).textContent = '✅ ' + file.name }
        }

        function processUpload() {
            const month = document.getElementById('uploadMonth')?.value
            if (!month) return
            if (!uploadedFiles.bai && !uploadedFiles.video) {
                state.uploadMsg = '⚠️ Vui lòng chọn ít nhất một file để upload'
                state.uploadStatus = 'error'
                render(); return
            }

            // Use SheetJS to read files
            const script = document.createElement('script')
            script.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js'
            script.onload = () => doProcess(month)
            document.head.appendChild(script)
        }

        function doProcess(month) {
            let baiMap = {}, videoMap = {}
            let pending = (uploadedFiles.bai ? 1 : 0) + (uploadedFiles.video ? 1 : 0)
            let done = 0

            function finish() {
                done++
                if (done < pending) return

                // Map bai to reporters by full name
                let updated = 0
                Object.entries(state.data.reporters).forEach(([name, v]) => {
                    const cleanName = name.replace(/\n/g, ' ').trim()
                    if (!v.monthly[month]) v.monthly[month] = { so_bai: 0, pv_bai: 0, video: 0, tong_pv: 0, du_thieu: 0 }

                    if (baiMap[cleanName] !== undefined) {
                        v.monthly[month].so_bai = baiMap[cleanName]
                        updated++
                    }
                    if (videoMap[cleanName] !== undefined) {
                        v.monthly[month].video = videoMap[cleanName]
                        updated++
                    }
                })

                state.uploadMsg = `✅ Đã cập nhật ${updated} trường dữ liệu cho tháng ${MONTHS.find(m => m.key === month)?.label}`
                state.uploadStatus = 'success'
                state.selectedMonth = month
                uploadedFiles = { bai: null, video: null }
                render()
            }

            if (uploadedFiles.bai) {
                const reader = new FileReader()
                reader.onload = e => {
                    const wb = XLSX.read(e.target.result, { type: 'array' })
                    const ws = wb.Sheets[wb.SheetNames[0]]
                    const data = XLSX.utils.sheet_to_json(ws)
                    data.forEach(row => {
                        const name = (row['Tên đầy đủ'] || row['ten_day_du'] || row['Author'] || '').toString().trim()
                        const bai = parseInt(row['Số bài'] || row['so_bai'] || 0)
                        if (name) baiMap[name] = bai
                    })
                    finish()
                }
                reader.readAsArrayBuffer(uploadedFiles.bai)
            }

            if (uploadedFiles.video) {
                const reader = new FileReader()
                reader.onload = e => {
                    const wb = XLSX.read(e.target.result, { type: 'array' })
                    const ws = wb.Sheets[wb.SheetNames[0]]
                    const data = XLSX.utils.sheet_to_json(ws)
                    data.forEach(row => {
                        const name = (row['Author'] || row['author'] || '').toString().trim()
                        const plays = parseInt(row['Plays'] || row['plays'] || row['TotalPlay'] || 0)
                        if (name) videoMap[name] = plays
                    })
                    finish()
                }
                reader.readAsArrayBuffer(uploadedFiles.video)
            }
        }

        // ─── INIT ────────────────────────────────────────────────────────────────
        render()
    </script>
</body>
</html>
